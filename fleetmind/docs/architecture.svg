<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 860" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b8cff"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <style>
      .bg{fill:#0b1020}
      .layer{fill:#0f1530;stroke:#1e2747;stroke-width:1.5}
      .layer-green{fill:#0c1f17;stroke:#10b981;stroke-width:1.5;stroke-opacity:0.5}
      .box{fill:#141b3d;stroke:#2a3566;stroke-width:1}
      .box-green{fill:#0e2018;stroke:#10b981;stroke-width:1;stroke-opacity:0.6}
      .title{fill:#e6ebff;font-weight:700}
      .ltitle{fill:#8b96c0;font-weight:700;font-size:12px;letter-spacing:1px}
      .ltitle-green{fill:#10b981;font-weight:700;font-size:12px;letter-spacing:1px}
      .btitle{fill:#e6ebff;font-weight:600;font-size:13px}
      .sub{fill:#8b96c0;font-size:11px}
      .mono{font-family:ui-monospace,SF Mono,monospace}
      .accent{fill:#5b8cff}
      .flow{stroke:#5b8cff;stroke-width:2;fill:none}
      .flow-green{stroke:#10b981;stroke-width:2;fill:none}
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="860"/>

  <!-- Title -->
  <text x="32" y="44" class="title" font-size="24">Fleet<tspan class="accent">Mind</tspan> <tspan class="sub" font-size="14" fill="#8b96c0">— EV Battery Asset Intelligence + Fleet Electrification · architecture</tspan></text>

  <!-- ROW 1: DATA -->
  <rect class="layer" x="32" y="70" width="730" height="96" rx="14"/>
  <text x="48" y="92" class="ltitle">DATA LAYER · observed_series contract</text>
  <rect class="box" x="48" y="104" width="340" height="50" rx="9"/>
  <text x="64" y="124" class="btitle">Synthetic-but-physical fleet</text>
  <text x="64" y="142" class="sub">10 EV assets · telematics + BMS capacity · CRC32-seeded</text>
  <rect class="box" x="404" y="104" width="340" height="50" rx="9"/>
  <text x="420" y="124" class="btitle">NASA battery aging dataset</text>
  <text x="420" y="142" class="sub mono">B0005/06/07/18 · real cells, validation</text>

  <!-- ROW 1 RIGHT: ELECTRIFICATION DATA -->
  <rect class="layer-green" x="32" y="176" width="730" height="64" rx="14"/>
  <text x="48" y="198" class="ltitle-green">ELECTRIFICATION DATA</text>
  <rect class="box-green" x="48" y="208" width="330" height="22" rx="6"/>
  <text x="64" y="223" class="sub">10 India ICE/CNG candidates · route · payload · duty · dwell (9 cities)</text>
  <rect class="box-green" x="392" y="208" width="354" height="22" rx="6"/>
  <text x="408" y="223" class="sub">India EV catalog · Euler · Mahindra · Tata · Switch · Eicher · Piaggio · Omega</text>

  <!-- ROW 2: DEGRADATION ENGINE -->
  <rect class="layer" x="32" y="258" width="730" height="120" rx="14"/>
  <text x="48" y="280" class="ltitle">DEGRADATION ENGINE  (NumPy)</text>
  <rect class="box" x="48" y="292" width="168" height="72" rx="9"/>
  <text x="62" y="312" class="btitle">Estimator</text>
  <text x="62" y="330" class="sub mono">loss = a·√EFC</text>
  <text x="62" y="346" class="sub mono">      + c·EFC</text>
  <text x="62" y="361" class="sub">2-mechanism LSQ fit</text>
  <rect class="box" x="228" y="292" width="168" height="72" rx="9"/>
  <text x="242" y="312" class="btitle">Fleet-pooled fit</text>
  <text x="242" y="330" class="sub">separates cycle vs</text>
  <text x="242" y="346" class="sub">calendar ageing</text>
  <text x="242" y="361" class="sub mono">b_cyc · b_cal</text>
  <rect class="box" x="408" y="292" width="168" height="72" rx="9"/>
  <text x="422" y="312" class="btitle">RUL projection</text>
  <text x="422" y="330" class="sub">bisection to the</text>
  <text x="422" y="346" class="sub">80% end-of-life knee</text>
  <text x="422" y="361" class="sub">days / cycles</text>
  <rect class="box" x="588" y="292" width="160" height="72" rx="9"/>
  <text x="602" y="312" class="btitle">Physics prior</text>
  <text x="602" y="330" class="sub">Arrhenius temp ·</text>
  <text x="602" y="346" class="sub">DoD · C-rate stress</text>
  <text x="602" y="361" class="sub">NMC / LFP coeffs</text>

  <!-- ROW 2 RIGHT: READINESS ENGINE -->
  <rect class="layer-green" x="32" y="388" width="730" height="120" rx="14"/>
  <text x="48" y="410" class="ltitle-green">READINESS ENGINE · electrification/</text>
  <rect class="box-green" x="48" y="422" width="215" height="74" rx="9"/>
  <text x="64" y="442" class="btitle">Readiness scorer</text>
  <text x="64" y="460" class="sub">5 sub-scores: range / charging /</text>
  <text x="64" y="476" class="sub">payload / duty / TCO payback</text>
  <text x="64" y="491" class="sub">→ readiness index 0–100</text>
  <rect class="box-green" x="275" y="422" width="215" height="74" rx="9"/>
  <text x="291" y="442" class="btitle">EV matcher</text>
  <text x="291" y="460" class="sub">class-compatible catalog lookup</text>
  <text x="291" y="476" class="sub">optimal EV + alternatives ranked</text>
  <text x="291" y="491" class="sub">confidence % + action verdict</text>
  <rect class="box-green" x="502" y="422" width="246" height="74" rx="9"/>
  <text x="518" y="442" class="btitle">Procurement economics</text>
  <text x="518" y="460" class="sub">fuel → EV cost/km delta</text>
  <text x="518" y="476" class="sub">annual saving (INR) · payback yrs</text>
  <text x="518" y="491" class="sub">OEM lead-time · phase-1 CapEx</text>

  <!-- ROW 3: AGENTS -->
  <rect class="layer" x="32" y="528" width="730" height="92" rx="14"/>
  <text x="48" y="550" class="ltitle">AGENT LAYER · Claude (opus-4-8 / haiku-4-5) + deterministic fallback</text>
  <rect class="box" x="48" y="562" width="222" height="46" rx="9"/>
  <text x="64" y="584" class="btitle">Asset-health briefing agent</text>
  <text x="64" y="601" class="sub">exec brief + physics-based maintenance recs</text>
  <rect class="box" x="282" y="562" width="222" height="46" rx="9"/>
  <text x="298" y="584" class="btitle">Predictive-maintenance agent</text>
  <text x="298" y="601" class="sub">downtime-aware work-order queue + ops plan</text>
  <rect class="box-green" x="516" y="562" width="228" height="46" rx="9"/>
  <text x="532" y="584" class="btitle" fill="#10b981">Procurement agent</text>
  <text x="532" y="601" class="sub">ICE→EV verdict · OEM · INR saving · payback</text>

  <!-- ROW 4: API -->
  <rect class="layer" x="32" y="640" width="730" height="78" rx="14"/>
  <text x="48" y="662" class="ltitle">API · FastAPI</text>
  <text x="48" y="688" class="sub mono" font-size="12.5">/health  ·  /fleet  ·  /asset/{id}  ·  /maintenance  ·  /model</text>
  <text x="48" y="705" class="sub mono" font-size="12.5">/eval  ·  /validation  ·  /validation/cells  · </text>
  <text x="370" y="705" class="sub mono" font-size="12.5" fill="#10b981">/electrification  ·  /electrification/{id}</text>

  <!-- ROW 5: DASHBOARD -->
  <rect class="layer" x="32" y="738" width="730" height="96" rx="14"/>
  <text x="48" y="760" class="ltitle">DASHBOARD · Next.js war-room</text>
  <rect class="box" x="48" y="772" width="128" height="50" rx="9"/>
  <text x="62" y="792" class="btitle">Fleet board</text>
  <text x="62" y="808" class="sub">worst-first SoH</text>
  <rect class="box" x="188" y="772" width="128" height="50" rx="9"/>
  <text x="202" y="792" class="btitle">Asset detail</text>
  <text x="202" y="808" class="sub">SoH/RUL chart</text>
  <rect class="box" x="328" y="772" width="128" height="50" rx="9"/>
  <text x="342" y="792" class="btitle">Maint. queue</text>
  <text x="342" y="808" class="sub">brief + schedule</text>
  <rect class="box" x="468" y="772" width="128" height="50" rx="9"/>
  <text x="482" y="792" class="btitle">Validation</text>
  <text x="482" y="808" class="sub">real NASA cells</text>
  <rect class="box-green" x="608" y="772" width="140" height="50" rx="9"/>
  <text x="622" y="792" class="btitle" fill="#10b981">Electrify tab</text>
  <text x="622" y="808" class="sub">readiness board +</text>
  <text x="622" y="820" class="sub">procurement intel</text>

  <!-- Flow arrows down the SoH/RUL spine -->
  <path class="flow" d="M397,166 L397,176" marker-end="url(#arrow)"/>
  <path class="flow" d="M397,240 L397,258" marker-end="url(#arrow)"/>
  <path class="flow" d="M397,378 L397,388" marker-end="url(#arrow)"/>
  <path class="flow" d="M397,508 L397,528" marker-end="url(#arrow)"/>
  <path class="flow" d="M397,620 L397,640" marker-end="url(#arrow)"/>
  <path class="flow" d="M397,718 L397,738" marker-end="url(#arrow)"/>

  <!-- Electrification data -> readiness engine arrow -->
  <path class="flow-green" d="M397,240 L397,258" marker-end="url(#arrow-green)"/>

  <!-- EVAL / VALIDATION side panel -->
  <rect x="790" y="258" width="218" height="242" rx="14" fill="#0c0c1f" stroke="#ff5d52" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="806" y="280" class="ltitle" fill="#ff8b84">EVAL &amp; VALIDATION</text>
  <rect class="box" x="806" y="292" width="186" height="58" rx="9"/>
  <text x="820" y="313" class="btitle">Synthetic harness</text>
  <text x="820" y="330" class="sub">SoH MAE 0.08 pp</text>
  <text x="820" y="344" class="sub">RUL MAPE 2.5%</text>
  <rect class="box" x="806" y="360" width="186" height="48" rx="9"/>
  <text x="820" y="380" class="btitle">Coefficient recovery</text>
  <text x="820" y="397" class="sub">cycle/cal &lt; 2.7% err</text>
  <rect class="box" x="806" y="418" width="186" height="70" rx="9"/>
  <text x="820" y="438" class="btitle">NASA real-data</text>
  <text x="820" y="455" class="sub">model RMSE ≤ 2.0%</text>
  <text x="820" y="470" class="sub">SoH forecast 3.4 pp</text>
  <text x="820" y="485" class="sub">RUL ~21 cycles</text>

  <!-- arrow engine -> eval -->
  <path d="M763,318 L790,322" stroke="#ff5d52" stroke-opacity="0.7" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="767" y="312" class="sub" fill="#ff8b84" font-size="10">validate</text>

  <!-- ELECTRIFICATION side panel -->
  <rect x="790" y="388" width="218" height="148" rx="14" fill="#0c1f17" stroke="#10b981" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="806" y="410" class="ltitle-green">FLEET SUMMARY</text>
  <rect class="box-green" x="806" y="422" width="186" height="96" rx="9"/>
  <text x="820" y="443" class="btitle" fill="#10b981">Fleet output</text>
  <text x="820" y="461" class="sub">4 electrify-now</text>
  <text x="820" y="477" class="sub">5 pilot deployment</text>
  <text x="820" y="493" class="sub">1 defer/monitor</text>
  <text x="820" y="509" class="sub">₹44.6 L/yr saving</text>

  <!-- arrow readiness engine -> elec summary -->
  <path class="flow-green" d="M763,448 L790,452" marker-end="url(#arrow-green)"/>
  <text x="767" y="442" class="sub" fill="#10b981" font-size="10">score</text>
</svg>
